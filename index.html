<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NBC CLOUD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1558a0;--blue-dk:#0e3d7a;--blue-xdk:#0d2b4e;
  --blue-lt:#e8f2fb;--blue-md:#bee3f8;
  --sidebar:#0d2440;--sidebar-hover:#162f55;--sidebar-active:#1558a0;
  --bg:#f0f4f8;--card:#fff;--border:#ccd9ea;
  --text:#1a2537;--text-2:#3d556e;--text-3:#8099b3;
  --green:#15803d;--green-bg:#dcfce7;
  --red:#b91c1c;--red-bg:#fee2e2;
  --amber:#92400e;--amber-bg:#fef3c7;
  --t1:#15803d;--t1-bg:#dcfce7;--t1-bd:#86efac;
  --t2:#1d4ed8;--t2-bg:#dbeafe;--t2-bd:#93c5fd;
  --t3:#be185d;--t3-bg:#fce7f3;--t3-bd:#f9a8d4;
  --r:10px;--rs:6px;
}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* NAV */
.pub-nav{background:var(--blue-xdk);height:52px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.logo-icon{width:28px;height:28px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;fill:#fff}
.logo-text{font-size:13px;font-weight:700;letter-spacing:2px;color:#fff}
.nav-links{display:flex;flex:1;gap:0;justify-content:flex-end}
.nl{padding:0 12px;height:52px;display:flex;align-items:center;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nl:hover,.nl.active{color:#fff;border-bottom-color:rgba(255,255,255,.5)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.btn-login{padding:6px 14px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:var(--rs);font-size:12px;cursor:pointer;transition:all .15s}
.btn-login:hover{background:rgba(255,255,255,.2)}
.lang-pill{font-size:11px;color:rgba(255,255,255,.5);padding:3px 8px;border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);cursor:pointer}

/* LAYOUT */
.app-shell{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;order:1}
.content-area{flex:1;min-width:0;order:2}
.sb-brand{padding:1.25rem 1rem .75rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo-row{display:flex;align-items:center;gap:8px}
.sb-icon{width:24px;height:24px;background:var(--blue);border-radius:5px;display:flex;align-items:center;justify-content:center}
.sb-icon svg{width:13px;height:13px;fill:#fff}
.sb-brand-text{font-size:11px;font-weight:700;letter-spacing:2px;color:#fff}
.sb-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.sb-section{padding:.4rem 0}
.sb-label{font-size:10px;color:rgba(255,255,255,.25);padding:6px 1rem 3px;letter-spacing:1px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{background:var(--sidebar-hover);color:#fff}
.sb-item.active{background:rgba(21,88,160,.25);color:#fff;border-left-color:var(--blue)}
.sb-item svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.sb-divider{height:1px;background:rgba(255,255,255,.07);margin:.4rem 0}
.sb-user{padding:.75rem 1rem;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto}
.sb-avatar{width:26px;height:26px;background:var(--blue);border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-uname{font-size:12px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:9px;color:rgba(255,255,255,.35)}

/* PAGES */
.page{max-width:96%;margin:0 auto;padding:1.75rem 2rem}
.page-doc{display:grid;grid-template-columns:220px 1fr;gap:2rem;max-width:96%;margin:0 auto;padding:1.75rem 2rem}
.ph{margin-bottom:1.25rem}
.ph h1{font-size:20px;font-weight:600;margin-bottom:4px}
.ph p{font-size:13px;color:var(--text-2)}
.bc{font-size:12px;color:var(--text-3);margin-bottom:.6rem;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.bc span{color:var(--blue);cursor:pointer}.bc span:hover{text-decoration:underline}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.sec-title{font-size:14px;font-weight:600;margin-bottom:1rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-weight:500;text-decoration:none}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:var(--blue-dk)}
.btn-o{background:#fff;color:var(--blue);border-color:var(--blue)}.btn-o:hover{background:var(--blue-lt)}
.btn-g{background:transparent;color:var(--text-2);border-color:var(--border)}.btn-g:hover{background:var(--bg)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#fca5a5}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-run{background:#dbeafe;color:#1d4ed8}
.b-done{background:var(--green-bg);color:var(--green)}
.b-fail{background:var(--red-bg);color:var(--red)}
.b-q{background:var(--amber-bg);color:var(--amber)}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-pend{background:#f1f5f9;color:#475569}
.b-t1{background:var(--t1-bg);color:var(--t1);font-weight:700}
.b-t2{background:var(--t2-bg);color:var(--t2);font-weight:700}
.b-t3{background:var(--t3-bg);color:var(--t3);font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-run{background:#3b82f6;animation:pulse 1.4s infinite}
.d-done{background:#16a34a}
.d-fail{background:#ef4444}
.d-q{background:#f59e0b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:12px;font-weight:500;color:var(--text-2);padding:9px 14px;text-align:left;background:#f8fafc;border-bottom:1px solid var(--border)}
.tbl td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f8fbfd}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tn{font-weight:500}.tsub{font-size:11px;color:var(--text-3);font-family:monospace;margin-top:1px}

/* FORM */
.fg{margin-bottom:1rem}
.fl{font-size:12px;font-weight:500;color:var(--text-2);display:block;margin-bottom:5px}
.req{color:#ef4444;margin-left:2px}
.fi,.fs,.ft{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:#fff;transition:border .15s;font-family:inherit}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(21,88,160,.1)}
.ft{min-height:80px;resize:vertical}
.fhint{font-size:11px;color:var(--text-3);margin-top:4px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.char-c{font-size:11px;color:var(--text-3);text-align:right;margin-top:2px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.modal{background:#fff;border-radius:var(--r);width:100%;max-width:640px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-wide{max-width:780px}
.mhd{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;border-radius:var(--r) var(--r) 0 0;z-index:1}
.mhd h3{font-size:15px;font-weight:600}
.mx{cursor:pointer;font-size:18px;color:var(--text-3);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;margin-top:-2px}
.mx:hover{background:var(--bg)}
.mbody{padding:1.5rem;max-height:68vh;overflow-y:auto}
.mft{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* STAT */
.stat-kv{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-kv:last-child{border-bottom:none}
.stat-kv .k{color:var(--text-2)}.stat-kv .v{font-weight:500}
.sbar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}
.sfill{height:100%;border-radius:3px;background:var(--blue)}
.sfill-g{background:#16a34a}

/* FILTER PILLS */
.fps{display:flex;gap:6px;flex-wrap:wrap}
.fp{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-2);transition:all .15s}
.fp.active{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-md)}

/* PROJECT TABS */
.project-shell{display:flex;flex-direction:column;gap:1rem}
.project-banner{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.project-banner .title-block{min-width:0}
.project-banner .title-block h1{margin-bottom:4px}
.project-banner .cta-group{display:flex;gap:8px;flex-wrap:wrap}
.project-panel{min-height:420px}
.ptabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.ptab{min-width:96px;min-height:44px;padding:0 18px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--text-2);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ptab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* VIEW TOGGLE */
.vtog{display:flex;gap:3px}
.vb{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--text-3);background:#fff}
.vb.active{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}

/* TASK LIST */
.thd{display:grid;grid-template-columns:2.5fr 1.8fr 1fr 1.1fr 1.1fr 1.2fr;padding:9px 14px;font-size:12px;font-weight:500;color:var(--text-2);background:#f8fafc;border-bottom:1px solid var(--border)}
.trow{display:grid;grid-template-columns:2.5fr 1.8fr 1fr 1.1fr 1.1fr 1.2fr;padding:12px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:13px;transition:background .1s}
.trow:last-child{border-bottom:none}
.trow:hover{background:#f8fbfd}
.tcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.tcard{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1rem;transition:box-shadow .15s,border-color .15s}
.tcard:hover{box-shadow:0 2px 12px rgba(21,88,160,.1);border-color:var(--blue)}
.al{font-size:12px;color:var(--blue);cursor:pointer;margin-right:8px}
.al:hover{text-decoration:underline}
.al.danger{color:var(--red)}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:0}
.step-i{display:flex;gap:1rem;padding-bottom:1.5rem;position:relative}
.step-i::before{content:'';position:absolute;left:15px;top:32px;width:2px;background:var(--blue-lt);bottom:0}
.step-i:last-child::before{display:none}
.step-i:last-child{padding-bottom:0}
.snum{width:32px;height:32px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;z-index:1}
.sbody h4{font-size:14px;font-weight:600;margin-bottom:4px;padding-top:5px}
.sbody p{font-size:13px;color:var(--text-2);line-height:1.75}

/* DOC TOC */
.doc-toc{position:sticky;top:1.75rem;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;height:fit-content}
.doc-toc h4{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:.75rem;letter-spacing:.5px}
.doc-toc a{display:block;font-size:12px;color:var(--text-2);padding:4px 0 4px 8px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.doc-toc a:hover,.doc-toc a.active{color:var(--blue);border-left-color:var(--blue)}
.doc-toc a.h3{padding-left:18px;font-size:11px}
.doc-content h2{font-size:17px;font-weight:600;margin:1.75rem 0 .75rem;padding-top:1.25rem;border-top:1px solid var(--border);color:var(--blue-dk)}
.doc-content h2:first-child{border-top:none;padding-top:0;margin-top:0}
.doc-content h3{font-size:14px;font-weight:600;margin:.75rem 0 .5rem}
.doc-content p{font-size:13px;color:var(--text-2);line-height:1.85;margin-bottom:.75rem}
.doc-content ul,.doc-content ol{margin:.5rem 0 .75rem 1.25rem}
.doc-content li{font-size:13px;color:var(--text-2);line-height:1.75;margin-bottom:3px}
.doc-note{background:var(--blue-lt);border-left:3px solid var(--blue);padding:.75rem 1rem;border-radius:0 var(--rs) var(--rs) 0;margin:.75rem 0;font-size:12px;color:var(--blue-dk)}
.doc-warn{background:var(--amber-bg);border-left:3px solid #f59e0b;padding:.75rem 1rem;border-radius:0 var(--rs) var(--rs) 0;margin:.75rem 0;font-size:12px;color:var(--amber)}
.code-block{background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:var(--rs);font-size:12px;font-family:monospace;margin:.75rem 0;overflow-x:auto;line-height:1.7}
.code-block .cmd{color:#7dd3fc}
.code-block .arg{color:#86efac}
.code-block .cmt{color:#64748b}

/* HOME */
.hero{background:linear-gradient(135deg,#071829 0%,#0d2b4e 45%,#1558a0 100%);color:#fff;padding:3.5rem 2rem;text-align:center}
.hero h1{font-size:42px;font-weight:800;letter-spacing:3px;margin-bottom:1.25rem}
.hero-desc{max-width:820px;margin:0 auto .65rem;font-size:15px;line-height:1.85;opacity:.9}
.hero-desc-en{max-width:820px;margin:0 auto;font-size:12px;opacity:.58;line-height:1.7}
.fcs{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;padding:1.75rem 2rem;max-width:96%;margin:0 auto}
.fc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.75rem}
.fc h3{font-size:16px;font-weight:600;margin-bottom:3px}
.fc-en{font-size:11px;color:var(--text-3);margin-bottom:.75rem}
.fc p{font-size:13px;color:var(--text-2);line-height:1.75;margin-bottom:.5rem}
.metrics-bar{background:#fff;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex}
.mi{flex:1;display:flex;align-items:center;gap:14px;padding:1.5rem 2rem;border-right:1px solid var(--border)}
.mi:last-child{border-right:none}
.mi-icon{width:40px;height:40px;background:var(--blue-lt);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mi-icon svg{width:19px;height:19px;fill:var(--blue)}
.mi-val{font-size:24px;font-weight:700;line-height:1}
.mi-lbl{font-size:10px;color:var(--text-3);font-weight:500;margin-top:2px;letter-spacing:.5px}
.platform-wrap{max-width:96%;margin:0 auto;padding:2rem 2rem}
.platform-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:2rem}
.nbc-tag{display:inline-flex;align-items:center;gap:5px;background:var(--blue-lt);color:var(--blue);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;margin-bottom:.75rem}
.fl-list{display:flex;flex-direction:column;gap:1rem}
.fl-item{display:flex;align-items:flex-start;gap:10px}
.fl-dot{width:7px;height:7px;background:var(--blue);border-radius:50%;flex-shrink:0;margin-top:5px}
.fl-item strong{font-size:13px;display:block;margin-bottom:2px}
.fl-item span{font-size:12px;color:var(--text-2)}
.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:96%;margin:0 auto;padding:0 2rem 2rem}
.ic{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;display:flex;flex-direction:column}
.ic-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:.75rem}
.ic h3{font-size:14px;font-weight:600;margin-bottom:.75rem}
.ic ul{list-style:none;margin-bottom:1rem;flex:1}
.ic ul li{font-size:12px;color:var(--text-2);padding:3px 0;display:flex;align-items:center;gap:6px}
.ic ul li::before{content:'';width:5px;height:5px;background:var(--text-3);border-radius:50%;flex-shrink:0}

/* PROJECT FORM STEPS */
.pstep-bar{padding:12px 1.5rem;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0}
.pstep{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);cursor:pointer;white-space:nowrap;padding:0 4px}
.pstep.active{color:var(--blue);font-weight:500}
.pstep.done{color:var(--green)}
.pstep-num{width:20px;height:20px;border-radius:50%;background:var(--bg);border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.pstep.active .pstep-num{background:var(--blue);border-color:var(--blue);color:#fff}
.pstep.done .pstep-num{background:var(--green);border-color:var(--green);color:#fff}
.pstep-line{flex:1;height:1px;background:var(--border);min-width:20px}
.radio-card{display:flex;align-items:flex-start;gap:10px;border:1.5px solid var(--border);border-radius:var(--rs);padding:12px;cursor:pointer;transition:all .15s;margin-bottom:8px}
.radio-card:hover{border-color:var(--blue-md)}
.rc-t1{border-color:var(--t1-bd)!important;background:#f0fdf4}
.rc-t2{border-color:var(--t2-bd)!important;background:#eff6ff}
.rc-t3{border-color:var(--t3-bd)!important;background:#fdf2f8}
.conf-box{border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:10px}
.conf-q{font-size:13px;font-weight:500;margin-bottom:4px}
.conf-hint{font-size:12px;color:var(--text-2);margin-bottom:8px;line-height:1.6}
.rr{display:flex;gap:10px;flex-wrap:wrap}
.rr label{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;padding:5px 12px;border:1px solid var(--border);border-radius:4px;transition:all .15s}
.rr label:hover{border-color:var(--blue)}
.kw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.review-sec{border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:10px}
.review-sec h4{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);letter-spacing:.5px}
.rv-row{display:flex;font-size:13px;padding:4px 0;gap:8px}
.rv-row .rk{color:var(--text-3);width:120px;flex-shrink:0;font-size:12px}

/* RESOURCE SELECTOR */
.res-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.rp{border:1.5px solid var(--border);border-radius:var(--rs);padding:10px;cursor:pointer;text-align:center;transition:all .15s}
.rp:hover{border-color:var(--blue)}
.rp.sel{border-color:var(--blue);background:var(--blue-lt)}
.rp-name{font-size:12px;font-weight:600;margin-bottom:2px}
.rp-spec{font-size:11px;color:var(--text-3)}
.rp-cost{font-size:11px;color:var(--blue);margin-top:4px}
.custom-res{border:1px solid var(--border);border-radius:var(--rs);padding:12px;background:#f8fafc;display:none;margin-top:8px}
.custom-res.show{display:block}
.res-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.res-row:last-child{margin:0}
.res-row label{font-size:12px;color:var(--text-2);width:60px;flex-shrink:0}
.rbs{display:flex;gap:4px;flex-wrap:wrap}
.rb{padding:3px 10px;border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;background:#fff;transition:all .15s}
.rb:hover{border-color:var(--blue)}
.rb.sel{background:var(--blue);color:#fff;border-color:var(--blue)}

/* TIER CARDS */
.tier-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:.75rem}
.tc{border-radius:var(--r);padding:1.25rem;border:1.5px solid}
.tc1{background:#f0fdf4;border-color:var(--t1-bd)}
.tc2{background:#eff6ff;border-color:var(--t2-bd)}
.tc3{background:#fdf2f8;border-color:var(--t3-bd)}
.tc h4{font-size:14px;font-weight:700;margin-bottom:.5rem}
.tc .tc-data{font-size:12px;color:var(--text-2);margin-bottom:.5rem;line-height:1.6}
.tc .tc-cost{font-size:13px;font-weight:600;margin-top:.75rem}
.tc .tc-meta{font-size:11px;color:var(--text-3);margin-top:4px}

/* BILLING */
.b-stat{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;text-align:center}
.b-stat .big{font-size:26px;font-weight:700}
.b-stat .lbl{font-size:11px;color:var(--text-3);margin-top:4px}

/* COLLAB TAGS */
.ctag{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--blue-lt);border:1px solid var(--blue-md);border-radius:var(--rs);font-size:13px;margin:3px}

/* PROFILE */
.prof-hd{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:1.25rem}
.prof-av{width:60px;height:60px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;flex-shrink:0}
.training-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.training-item:last-child{border-bottom:none}

/* ANALYSIS WORKFLOW */
.workflow-hero{background:linear-gradient(135deg,#071829,#1558a0);color:#fff;padding:2rem;border-radius:var(--r);margin-bottom:1.25rem}
.wf-step{display:flex;align-items:flex-start;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
.wf-step:last-child{border-bottom:none}
.wf-step-num{width:28px;height:28px;background:var(--blue-lt);color:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.tool-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1rem;display:flex;align-items:flex-start;gap:12px}
.tool-icon{width:36px;height:36px;background:var(--blue-lt);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:var(--blue)}
.cost-est{background:#f8fafc;border:1px solid var(--border);border-radius:var(--rs);padding:12px}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cost-row:last-child{border-bottom:none}

/* RESULT PAGE */
.result-metric{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center}
.result-metric .rm-val{font-size:20px;font-weight:700;color:var(--blue)}
.result-metric .rm-lbl{font-size:11px;color:var(--text-3);margin-top:3px}
.progress-bar{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin-top:6px}
.pb-fill{height:100%;border-radius:5px;background:var(--blue)}

/* FOOTER */
.footer{background:#071829;color:#6a88a4;padding:2.5rem 2rem 1.5rem}
.footer-inner{max-width:96%;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:2rem;margin-bottom:2rem}
.footer-brand h2{font-size:20px;font-weight:700;color:#fff;letter-spacing:1px}
.footer-sub{font-size:10px;color:#3a5570;letter-spacing:1px;margin-bottom:4px}
.footer-brand p{font-size:12px;margin-top:.5rem;line-height:1.6}
.footer-col h4{font-size:11px;font-weight:600;color:#fff;margin-bottom:.75rem;letter-spacing:.5px}
.footer-col a{display:block;font-size:12px;color:#456;margin-bottom:6px;cursor:pointer;transition:color .15s}
.footer-col a:hover{color:#fff}
.footer-bot{border-top:1px solid #0d2b4e;padding-top:1rem;display:flex;justify-content:space-between;font-size:11px;color:#3a5570}
</style>

function goto(p,extra){
  curPage=p;
  if(extra){
    if(typeof extra==='object'){
      if(extra.section) projectSection=extra.section;
      if(extra.id) curProj=extra.id;
      else if(typeof extra==='string') curProj=extra;
    } else {
      curProj=extra;
    }
  }
  var loggedPages=['my-projects','my-workspace','my-tasks','billing','profile'];
  if(loggedPages.includes(p)&&!loggedIn){doLogin();return}
  updateNav();
  var isApp=loggedPages.includes(p);
  document.getElementById('pub-nav').style.display=isApp?'none':'flex';
  document.getElementById('pub-content').style.display=isApp?'none':'block';
  document.getElementById('shell').style.display=isApp?'flex':'none';
  if(isApp){
    updateSB(p);
    document.getElementById('shell-content').innerHTML=renderPage(p);
  }else{
    document.getElementById('pub-content').innerHTML=renderPage(p);
  }
  window.scrollTo(0,0);
}
function renderPage(p){
  var m={home:rHome,data:rData,'data-gtop':()=>rDB('GTOP'),'data-cryoseek':()=>rDB('CryoSeek'),'data-1kcp':()=>rDB('1KCP'),access:rAccess,analysis:rAnalysis,submit:rSubmit,resources:rResources,about:rAbout,'my-projects':rProjects,'my-workspace':rWorkspace,'my-tasks':rTasks,billing:rBilling,profile:rProfile,'result-bwa':rBWAResult};
  return(m[p]||rHome)();
}
function updateNav(){document.querySelectorAll('.nl[data-p]').forEach(el=>el.classList.toggle('active',el.dataset.p===curPage))}
function updateSB(p){
  document.querySelectorAll('.sb-item[id^=sb-]').forEach(el=>el.classList.remove('active'));
  var m={'my-projects':'sb-projects','my-workspace':'sb-workspace','my-tasks':'sb-tasks','billing':'sb-billing','profile':'sb-profile'};
  if(m[p])document.getElementById(m[p]).classList.add('active');
}
function switchProjectSection(section){
  projectSection=section;
  if(curPage==='my-projects')document.getElementById('shell-content').innerHTML=rProjects();
}
